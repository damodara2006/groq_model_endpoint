services:
  - type: web
    name: groq-model-endpoint
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set this manually in the Render dashboard
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: LLM_TEMPERATURE
        value: "0.3"
      - key: LLM_MAX_TOKENS
        value: "512"
    healthCheckPath: /health
    autoDeploy: true
